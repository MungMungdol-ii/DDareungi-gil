.input-row:focus-within{border-color:rgba(255,255,255,0.3);}
.input-row input{background:none;border:none;outline:none;color:white;font-size:14px;font-family:inherit;flex:1;min-width:0;}
.input-row input::placeholder{color:rgba(255,255,255,0.35);}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot-start{background:var(--green);}
.dot-end{background:var(--orange);}
.clear-btn{background:none;border:none;color:rgba(255,255,255,0.4);font-size:14px;cursor:pointer;padding:0 2px;display:none;}

.ac-addr{font-size:11px;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.search-btn{margin-top:8px;border:none;border-radius:12px;padding:12px;width:100%;color:white;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green);transition:all 0.2s;}

function escapeHTML(value){
  return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

async function searchPlaces(keyword){
  if(!keyword.trim())return [];
  try{
    const url='/.netlify/functions/places?query='+encodeURIComponent(keyword);
    const res=await fetch(url);
    if(!res.ok)return [];
    const data=await res.json();
    return Array.isArray(data)?data:[];
  }catch{
    return [];
  }
}

function renderAC(list,places,inputEl,setter){
  if(!places.length){list.classList.remove('show');return;}
  list.innerHTML=places.map((p,i)=>
    '<div class="autocomplete-item" data-idx="'+i+'">'+
    '<span class="ac-icon">&#128205;</span>'+
    '<div class="ac-info">'+
    '<div class="ac-name">'+escapeHTML(p.place_name)+'</div>'+
    '<div class="ac-addr">'+escapeHTML(p.road_address_name||p.address_name||'')+'</div>'+
    '</div></div>'
  ).join('');
  list.classList.add('show');
  list.querySelectorAll('.autocomplete-item').forEach(item=>{
    item.addEventListener('mousedown',e=>{
      e.preventDefault();
      const p=places[parseInt(item.dataset.idx)];
      inputEl.value=p.place_name;
      setter({lat:parseFloat(p.y),lng:parseFloat(p.x),name:p.place_name});
      list.classList.remove('show');
      inputEl.closest('.input-group').querySelector('.clear-btn').style.display='block';
      checkInputs();
    });
  });
}

function setupInput(inputEl,acList,setter){
  let debounceTimer=null;
  let requestSeq=0;
  inputEl.addEventListener('input',()=>{
    const currentSeq=++requestSeq;
    setter(null);checkInputs();
    const val=inputEl.value.trim();
    inputEl.closest('.input-group').querySelector('.clear-btn').style.display=val?'block':'none';
    clearTimeout(debounceTimer);
    if(!val){acList.classList.remove('show');return;}
    debounceTimer=setTimeout(async()=>{
      const places=await searchPlaces(val);
      if(currentSeq===requestSeq&&inputEl.value.trim()===val){
        renderAC(acList,places,inputEl,setter);
      }
    },300);
  });
  inputEl.addEventListener('blur',()=>setTimeout(()=>acList.classList.remove('show'),150));
  inputEl.addEventListener('focus',()=>{
    const val=inputEl.value.trim();
    if(val) searchPlaces(val).then(places=>renderAC(acList,places,inputEl,setter));
  });
}

setupInput(inputStart,acStart,v=>{selectedStart=v;});
setupInput(inputEnd,acEnd,v=>{selectedEnd=v;});

document.getElementById('clear-start').onclick=()=>{inputStart.value='';selectedStart=null;acStart.classList.remove('show');document.getElementById('clear-start').style.display='none';checkInputs();};
document.getElementById('clear-end').onclick=()=>{inputEnd.value='';selectedEnd=null;acEnd.classList.remove('show');document.getElementById('clear-end').style.display='none';checkInputs();};
searchBtn.onclick=doSearch;

function setLoading(on,msg){
  if(on){searchBtn.classList.add('loading');searchBtn.disabled=true;document.getElementById('loading-steps').classList.add('show');if(msg)document.getElementById('step-text').textContent=msg;}
  else{searchBtn.classList.remove('loading');document.getElementById('loading-steps').classList.remove('show');checkInputs();}
}

function haversine(a,b,c,d){
  const R=6371000,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function nearestCandidates(coord,stations,needAvail,n,maxStraightDist=Infinity){
  const withDist=[];
  for(const s of stations){
    const la=parseFloat(s.stationLatitude),lo=parseFloat(s.stationLongitude);
    if(!la||!lo)continue;
    if(needAvail&&parseInt(s.parkingBikeTotCnt)===0)continue;
    const d=haversine(coord.lat,coord.lng,la,lo);
    if(d>maxStraightDist)continue;
    withDist.push({...s,lat:la,lng:lo,straightDist:d});
  }
  withDist.sort((a,b)=>a.straightDist-b.straightDist);
  return withDist.slice(0,n);
}

// OSRM 도보 경로로 실제 거리/시간 계산
async function osrmWalkRoute(lat1,lng1,lat2,lng2){
  try{
    const url=`https://router.project-osrm.org/route/v1/foot/${lng1},${lat1};${lng2},${lat2}?overview=false`;
    const res=await fetch(url,{signal:AbortSignal.timeout(5000)});
    const data=await res.json();
    if(data.code==='Ok'&&data.routes&&data.routes[0]){
      return {dist:data.routes[0].distance,duration:data.routes[0].duration};
    }
  }catch{}
  return null;
}

// OSRM 자전거 경로로 실제 거리/시간 계산
async function osrmBikeRoute(lat1,lng1,lat2,lng2){
  try{
    const url=`https://router.project-osrm.org/route/v1/cycling/${lng1},${lat1};${lng2},${lat2}?overview=false`;
    const res=await fetch(url,{signal:AbortSignal.timeout(5000)});
    const data=await res.json();
    if(data.code==='Ok'&&data.routes&&data.routes[0]){
      return {dist:data.routes[0].distance,duration:data.routes[0].duration};
    }
  }catch{}
  return null;
}

// 후보들 중 실제 도보거리가 가장 짧은 정류소 찾기
async function findBestStationByWalk(coord,candidates){
  const results=await Promise.all(candidates.map(async(c)=>{
    const r=await osrmWalkRoute(coord.lat,coord.lng,c.lat,c.lng);
    return {...c,walkDist:r?r.dist:c.straightDist*1.4,walkDuration:r?r.duration:null};
  }));
  results.sort((a,b)=>a.walkDist-b.walkDist);
  return results[0];
}

async function enrichWalkCandidates(coord,candidates){
  const results=await Promise.all(candidates.map(async(c)=>{
    const r=await osrmWalkRoute(coord.lat,coord.lng,c.lat,c.lng);
    const walkDist=r?r.dist:c.straightDist*1.25;
    return {...c,walkDist,walkDuration:r?r.duration:null};
  }));
  return results
    .filter(c=>c.walkDist<=MAX_WALK_TO_STATION)
    .sort((a,b)=>a.walkDist-b.walkDist);
}

async function calcRoute(s,e,ss,es){
  // 출발지→정류소(도보, 이미 계산됨), 정류소→정류소(자전거), 정류소→도착(도보)
  const d1=ss.walkDist,t1raw=ss.walkDuration;
  const bikeRoute=await osrmBikeRoute(ss.lat,ss.lng,es.lat,es.lng);
  const d2=bikeRoute?bikeRoute.dist:haversine(ss.lat,ss.lng,es.lat,es.lng)*1.3;
  const t2raw=bikeRoute?bikeRoute.duration:null;
  const d3=es.walkDist,t3raw=es.walkDuration;

  const t1=t1raw?Math.ceil(t1raw/60):Math.ceil(d1/WALK_M_PER_MIN);
  const t2=t2raw?Math.ceil(t2raw/60):Math.ceil(d2/BIKE_M_PER_MIN);
  const t3=t3raw?Math.ceil(t3raw/60):Math.ceil(d3/WALK_M_PER_MIN);

  return{totalTime:t1+t2+t3,totalDist:Math.round((d1+d2+d3)/100)/10,walk1:{dist:Math.round(d1),time:t1},bike:{dist:Math.round(d2),time:t2},walk2:{dist:Math.round(d3),time:t3}};
}

async function findBestBikeRoute(s,e,startCandidates,endCandidates){
  const [starts,ends]=await Promise.all([
    enrichWalkCandidates(s,startCandidates),
    enrichWalkCandidates(e,endCandidates)
  ]);

  if(!starts.length)return {error:'출발지에서 걸어갈 만한 따릉이 대여소가 없어요'};
  if(!ends.length)return {error:'도착지 근처에 걸어갈 만한 따릉이 반납소가 없어요'};

  const approxPairs=[];
  for(const ss of starts){
    for(const es of ends){
      const bikeDist=haversine(ss.lat,ss.lng,es.lat,es.lng)*1.3;
      const walkDist=ss.walkDist+es.walkDist;
      const totalTime=Math.ceil(ss.walkDist/WALK_M_PER_MIN)+Math.ceil(bikeDist/BIKE_M_PER_MIN)+Math.ceil(es.walkDist/WALK_M_PER_MIN);
      approxPairs.push({ss,es,totalTime,walkDist,bikeDist});
    }
  }

  approxPairs.sort((a,b)=>
    a.totalTime-b.totalTime ||
    a.walkDist-b.walkDist ||
    a.bikeDist-b.bikeDist
  );

  const detailed=await Promise.all(
    approxPairs.slice(0,DETAILED_ROUTE_LIMIT).map(async(pair)=>{
      const route=await calcRoute(s,e,pair.ss,pair.es);
      return {...pair,route};
    })
  );

  detailed.sort((a,b)=>
    a.route.totalTime-b.route.totalTime ||
    (a.route.walk1.dist+a.route.walk2.dist)-(b.route.walk1.dist+b.route.walk2.dist) ||
    a.route.bike.dist-b.route.bike.dist
  );

  return detailed[0];
}

async function fetchRouteGeometry(lat1,lng1,lat2,lng2,profile){
  try{
    const url=`https://router.project-osrm.org/route/v1/${profile}/${lng1},${lat1};${lng2},${lat2}?overview=full&geometries=geojson`;
    const res=await fetch(url,{signal:AbortSignal.timeout(5000)});
    const data=await res.json();
    if(data.code==='Ok'&&data.routes&&data.routes[0]){
      return data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
    }
  }catch{}
  return null;
}

async function drawMap(s,e,ss,es){
  markers.forEach(m=>map.removeLayer(m));polylines.forEach(p=>map.removeLayer(p));markers=[];polylines=[];
  const ic=(color,label)=>L.divIcon({html:'<div style="background:'+color+';color:white;font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.25);font-family:sans-serif;">'+label+'</div>',className:'',iconAnchor:[0,28]});

  const [path1,path2,path3]=await Promise.all([
    fetchRouteGeometry(s.lat,s.lng,ss.lat,ss.lng,'foot'),
    fetchRouteGeometry(ss.lat,ss.lng,es.lat,es.lng,'cycling'),
    fetchRouteGeometry(es.lat,es.lng,e.lat,e.lng,'foot'),
  ]);

  polylines=[
    L.polyline(path1||[[s.lat,s.lng],[ss.lat,ss.lng]],{color:'#9AA0AB',weight:4,dashArray:'8,6'}).addTo(map),
    L.polyline(path2||[[ss.lat,ss.lng],[es.lat,es.lng]],{color:'#2ECC71',weight:5}).addTo(map),
    L.polyline(path3||[[es.lat,es.lng],[e.lat,e.lng]],{color:'#9AA0AB',weight:4,dashArray:'8,6'}).addTo(map),
  ];
  markers=[
    L.marker([s.lat,s.lng],{icon:ic('#2ECC71','출발')}).addTo(map),
    L.marker([ss.lat,ss.lng],{icon:ic('#1A2D4F','🚲')}).addTo(map),
    L.marker([es.lat,es.lng],{icon:ic('#1A2D4F','🚲')}).addTo(map),
    L.marker([e.lat,e.lng],{icon:ic('#FF6B35','도착')}).addTo(map),
  ];
  map.fitBounds([[s.lat,s.lng],[ss.lat,ss.lng],[es.lat,es.lng],[e.lat,e.lng]],{padding:[40,40]});
  document.getElementById('map-hint').style.display='none';
}

async function doSearch(){
  if(!selectedStart||!selectedEnd)return;
  setLoading(true,'🚲 따릉이 정류소 불러오는 중...');
  hideResult();
  try{
    const stations=await fetchBikeStations();

    setLoading(true,'🚶 가까운 정류소 후보 계산 중...');
    const startCandidates=nearestCandidates(selectedStart,stations,true,STATION_CANDIDATE_LIMIT,MAX_WALK_TO_STATION);
    const endCandidates=nearestCandidates(selectedEnd,stations,false,STATION_CANDIDATE_LIMIT,MAX_WALK_TO_STATION);
    if(!startCandidates.length){showToast('근처에 이용 가능한 따릉이 정류소가 없어요');return;}
    if(!endCandidates.length){showToast('도착지 근처에 따릉이 정류소가 없어요');return;}

    setLoading(true,'🗺️ 가장 자연스러운 따릉이 경로 계산 중...');
    const best=await findBestBikeRoute(selectedStart,selectedEnd,startCandidates,endCandidates);
    if(best.error){showToast(best.error);return;}

    const ss=best.ss,es=best.es,r=best.route;
    await drawMap(selectedStart,selectedEnd,ss,es);
    showResult(r,selectedStart.name,selectedEnd.name,ss,es);
  }catch(e){console.error(e);showToast('경로를 찾는 중 오류가 발생했어요');}
  finally{setLoading(false);}
}

function showResult(r,sn,en,ss,es){
  const bc=parseInt(ss.parkingBikeTotCnt)||0;
  const safeSn=escapeHTML(sn);
  const safeEn=escapeHTML(en);
  const safeStartStation=escapeHTML(ss.stationName);
  const safeEndStation=escapeHTML(es.stationName);
  const dataModeTag=stationDataMode==='sample'?'<span class="tag tag-gray">샘플 데이터</span>':'';
  document.getElementById('panel-inner').innerHTML=`
    <div class="total-section">
      <div class="total-row"><span class="time-big">${r.totalTime}</span><span class="time-unit">분</span></div>
      <div class="tags"><span class="tag tag-green">🚲 총 ${r.totalDist}km</span><span class="tag tag-gray">도보 ${r.walk1.time+r.walk2.time}분 포함</span>${dataModeTag}</div>
    </div>
    <div class="steps">
      <div class="step">
        <div class="step-left"><div class="step-icon icon-walk">🚶</div><div class="step-line line-walk"></div></div>
        <div class="step-right"><div class="step-label">${safeSn} → ${safeStartStation}</div><div class="step-desc">도보 ${r.walk1.dist}m</div><span class="step-badge badge-gray">⏱ ${r.walk1.time}분</span></div>
      </div>
      <div class="step">
        <div class="step-left"><div class="step-icon icon-bike">🚲</div><div class="step-line line-bike"></div></div>
        <div class="step-right"><div class="step-label">${safeStartStation} → ${safeEndStation}</div><div class="step-desc">따릉이 ${r.bike.dist}m</div><div style="display:flex;gap:6px;margin-top:5px;"><span class="tag tag-green"><span class="avail-dot"></span>자전거 ${bc}대 대여 가능</span></div><span class="step-badge badge-green">⏱ ${r.bike.time}분</span></div>
      </div>
      <div class="step">
        <div class="step-left"><div class="step-icon icon-walk">🚶</div></div>
        <div class="step-right" style="padding-bottom:0"><div class="step-label">${safeEndStation} → ${safeEn}</div><div class="step-desc">도보 ${r.walk2.dist}m</div><span class="step-badge badge-gray">⏱ ${r.walk2.time}분</span></div>
      </div>
    </div>
    <button class="go-btn" onclick="showToast('길안내 기능은 준비 중이에요 🚲')">🚲 길안내 시작</button>
  `;
  const panel=document.getElementById('result-panel');
  panel.style.display='block';
  setTimeout(()=>panel.classList.add('open'),10);
}

function hideResult(){const p=document.getElementById('result-panel');p.classList.remove('open');setTimeout(()=>{p.style.display='none';},350);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
